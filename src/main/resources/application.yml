server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

jwt:
  secret: your-very-long-secret-key-your-very-long-secret-key-123456
  access-token-expiration-seconds: 3600

app:
  admin:
    email: admin@test.com
    password: Admin1234!
    name: 관리자

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    tryItOutEnabled: true
    disable-swagger-default-url: true

reservation:
  expire-batch-fixed-delay-ms: 60000

logging:
  level:
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG

settlement:
  daily:
    cron: 0 0 1 * * *